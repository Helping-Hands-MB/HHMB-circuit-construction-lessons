<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helping Hands MB Magnetism Basics | HHMB Circuit Lessons</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Link to our shared CSS file relative to the lesson depth -->
    <link rel="stylesheet" href="../shared/lesson-style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar for Lesson Text -->
        <aside class="tutorial-panel">
            <header class="tutorial-header">
                <div class="header-brand">
                    <a href="https://helpinghandsmb.org" target="_blank" rel="noopener noreferrer">
                        <img src="../resources/HHMB%20Logo%20Square%20w%20Text%20png.png" alt="HHMB Logo" class="brand-logo">
                    </a>
                    <h1>Helping Hands MB Magnetism Basics</h1>
                </div>
                <button type="button" id="settings-toggle-btn" class="settings-toggle-btn" title="Settings" aria-label="Toggle settings panel" aria-expanded="false">
                    <svg class="settings-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                    </svg>
                </button>
            </header>

            <!-- Interactive Settings Overlay Panel -->
            <div id="settings-panel" class="settings-panel" aria-label="Settings panel">
                <div class="settings-panel-header">
                    <h3>Lesson Settings</h3>
                    <button type="button" id="settings-close-btn" class="settings-close-btn" title="Close Settings" aria-label="Close settings panel">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
                <div class="settings-panel-body">
                    <!-- Sidebar Width Preference Group -->
                    <div class="setting-group">
                        <div class="setting-label-row">
                            <span class="setting-title">Sidebar Width</span>
                            <span id="sidebar-width-display" class="width-val">350px</span>
                        </div>
                        <div class="setting-control-row">
                            <div class="preset-buttons">
                                <button type="button" id="btn-width-standard" class="preset-btn active" title="Standard width (350px)">Standard</button>
                                <button type="button" id="btn-width-wide" class="preset-btn" title="Wide width (550px)">Wide</button>
                            </div>
                        </div>
                        <div class="setting-control-row slider-row">
                            <input type="range" id="sidebar-width-slider" min="300" max="800" step="10" value="350" aria-label="Sidebar width slider">
                        </div>
                    </div>

                    <!-- Translation Preference Group -->
                    <div class="setting-group">
                        <span class="setting-title">Keyterm Translation</span>
                        <div class="setting-control-row">
                            <div class="preset-buttons">
                                <button type="button" class="preset-btn lang-btn active" data-lang="none" title="English / Off">Off</button>
                                <button type="button" class="preset-btn lang-btn" data-lang="en" title="English Definitions">English</button>
                                <button type="button" class="preset-btn lang-btn" data-lang="es" title="Español (Spanish)">Español</button>
                                <button type="button" class="preset-btn lang-btn" data-lang="pt" title="Português (Portuguese)">Português</button>
                                <button type="button" class="preset-btn lang-btn" data-lang="fr" title="Français (French)">Français</button>
                                <button type="button" class="preset-btn lang-btn" data-lang="de" title="Deutsch (German)">Deutsch</button>
                            </div>
                        </div>
                        <p class="setting-help-text">Choose a language and hover or click on underlined keyterms in the guide for instant translations.</p>
                    </div>
                </div>
            </div>

            <main class="lesson-content">
                <div class="lesson-header">
                    <h2>Lesson Guide</h2>
                    <span id="progress-text" class="progress-indicator"></span>
                </div>

                <!-- This container receives slide changes, animates and injects steps dynamically -->
                <section class="lesson-step" id="step-container">
                    <h3 id="step-title">Loading...</h3>
                    <p id="step-content">Please wait.</p>
                </section>
            </main>

            <footer>
                <button id="reset-btn" class="secondary-btn">Reset</button>
                <button id="prev-btn" class="secondary-btn" disabled>Previous</button>
                <button id="next-btn" class="primary-btn">Next Step</button>
            </footer>
        </aside>

        <!-- Main Simulation Area -->
        <section class="simulation-container">
            <iframe
                src="https://phet.colorado.edu/sims/html/magnet-and-compass/latest/magnet-and-compass_all.html"
                title="Helping Hands MB Magnetism Basics Simulation"
                allowfullscreen>
            </iframe>
        </section>
    </div>

    <!-- Dynamic custom keyterm translation tooltip container -->
    <div id="keyterm-tooltip" class="keyterm-tooltip" role="tooltip" style="display: none;">
        <div class="tooltip-arrow"></div>
        <div class="tooltip-header">
            <span id="tooltip-original" class="original-word">term</span>
            <button id="tooltip-pronounce" class="pronounce-btn" title="Listen to translation">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                    <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                </svg>
            </button>
        </div>
        <div id="tooltip-translation" class="tooltip-translation">translation</div>
        <div id="tooltip-definition" class="tooltip-definition">definition</div>
    </div>

    <!-- We load keyterms first so they are available to the engine -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.5/purify.min.js"></script>
    <script src="../shared/keyterms.js"></script>
    <!-- We load the locally compiled steps generated from Markdown -->
    <script src="steps.js"></script>
    <!-- We link our shared Javascript logic containing button listeners and rendering engine -->
    <script src="../shared/lesson-engine.js"></script>
</body>
</html>
