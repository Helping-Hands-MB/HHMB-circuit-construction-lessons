name: Compile and Deploy lessons

on:
  push:
    branches:
      - main

# Grant permissions to write content to the gh-pages deployment branch
permissions:
  contents: write

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }} # Prevent concurrent deployments
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js Environment 🔧
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # We run standard npm install to fetch marked and js-yaml
      - name: Install Dependencies 📦
        run: npm install

      # We execute the compiler script to parse lessons & rebuild the homepage grid
      - name: Compile Markdown Lessons 🚀
        run: npm run build

      # Deploy the output to the gh-pages branch. 
      # Since we build in place, deploying '.' pushes the entire generated site
      - name: Deploy to GitHub Pages 🌐
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
          branch: gh-pages
          clean-exclude: |
            .git
            .github
