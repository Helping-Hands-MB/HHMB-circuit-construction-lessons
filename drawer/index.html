<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HHMB City Planner Map Drawer</title>
    <!-- Link to Oswald font for heads -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="drawer-style.css">
</head>
<body>
    <div class="drawer-container">
        <!-- Sidebar Toolbar -->
        <aside class="toolbar-panel">
            <div class="toolbar-header">
                <h2>Planner Tools</h2>
                <p>Select a brush below and click/drag on the grid to design your city!</p>
            </div>
            
            <div class="tools-grid">
                <!-- City Limits -->
                <button type="button" class="tool-btn active" data-tool="limits" title="City Limits Brush">
                    <div class="tool-icon icon-limits"></div>
                    <span class="tool-label">City Limits</span>
                </button>
                
                <!-- Neighborhood -->
                <div class="tool-btn-wrapper">
                    <button type="button" class="tool-btn" data-tool="neighborhood" title="Neighborhood (Homes) Brush">
                        <div class="tool-icon icon-neighborhood"></div>
                        <span class="tool-label">Neighborhood</span>
                    </button>
                    <button type="button" class="edit-btn" data-tool="neighborhood" title="Customize Neighborhood Graphic">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="edit-btn-svg"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg>
                    </button>
                </div>
                
                <!-- Business -->
                <div class="tool-btn-wrapper">
                    <button type="button" class="tool-btn" data-tool="business" title="Business (Shops/Offices) Brush">
                        <div class="tool-icon icon-business"></div>
                        <span class="tool-label">Business</span>
                    </button>
                    <button type="button" class="edit-btn" data-tool="business" title="Customize Business Graphic">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="edit-btn-svg"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg>
                    </button>
                </div>
                
                <!-- Park -->
                <div class="tool-btn-wrapper">
                    <button type="button" class="tool-btn" data-tool="park" title="Park (Green Space) Brush">
                        <div class="tool-icon icon-park"></div>
                        <span class="tool-label">Park / Trees</span>
                    </button>
                    <button type="button" class="edit-btn" data-tool="park" title="Customize Park Graphic">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="edit-btn-svg"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg>
                    </button>
                </div>
                
                <!-- Road -->
                <div class="tool-btn-wrapper">
                    <button type="button" class="tool-btn" data-tool="road" title="Road Brush">
                        <div class="tool-icon icon-road"></div>
                        <span class="tool-label">Road</span>
                    </button>
                    <button type="button" class="edit-btn" data-tool="road" title="Customize Road Graphic">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="edit-btn-svg"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg>
                    </button>
                </div>
                
                <!-- Path -->
                <div class="tool-btn-wrapper">
                    <button type="button" class="tool-btn" data-tool="path" title="Walkway/Path Brush">
                        <div class="tool-icon icon-path"></div>
                        <span class="tool-label">Walkway</span>
                    </button>
                    <button type="button" class="edit-btn" data-tool="path" title="Customize Walkway Graphic">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="edit-btn-svg"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg>
                    </button>
                </div>
                
                <!-- Train Track -->
                <div class="tool-btn-wrapper">
                    <button type="button" class="tool-btn" data-tool="track" title="Train Track Brush">
                        <div class="tool-icon icon-track"></div>
                        <span class="tool-label">Train Track</span>
                    </button>
                    <button type="button" class="edit-btn" data-tool="track" title="Customize Train Track Graphic">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="edit-btn-svg"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg>
                    </button>
                </div>
                
                <!-- Water -->
                <div class="tool-btn-wrapper">
                    <button type="button" class="tool-btn" data-tool="water" title="Water (River/Lake) Brush">
                        <div class="tool-icon icon-water"></div>
                        <span class="tool-label">Water</span>
                    </button>
                    <button type="button" class="edit-btn" data-tool="water" title="Customize Water Graphic">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="edit-btn-svg"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg>
                    </button>
                </div>
                
                <!-- Eraser -->
                <button type="button" class="tool-btn tool-eraser" data-tool="eraser" title="Eraser Tool">
                    <div class="tool-icon icon-eraser"></div>
                    <span class="tool-label">Eraser</span>
                </button>
            </div>
            
            <div class="toolbar-footer">
                <button type="button" id="clear-btn" class="clear-btn" title="Reset current canvas">Clear All</button>
                <div class="autosave-indicator">
                    <span class="indicator-dot"></span>
                    <span class="indicator-text">Auto-Saved</span>
                </div>
            </div>
        </aside>

        <!-- Main Map Area -->
        <main class="canvas-panel">
            <div id="grid-canvas" class="grid-canvas" aria-label="City construction grid canvas">
                <!-- Generated dynamically by drawer.js -->
            </div>
        </main>
    </div>
    <!-- Pixel Art Editor Modal -->
    <div id="editor-modal" class="modal-overlay hidden" aria-hidden="true">
        <div class="modal-content">
            <header class="modal-header">
                <div>
                    <h3>Customize Graphic</h3>
                    <div class="tool-subtitle" id="editor-tool-title">Neighborhood</div>
                </div>
                <button type="button" id="modal-close-header-btn" class="modal-close-btn" title="Close Editor">&times;</button>
            </header>
            <div class="modal-body">
                <!-- Left Side: Drawing Grid Canvas -->
                <div class="editor-canvas-column">
                    <div id="editor-grid" class="editor-grid">
                        <!-- 8x8 squares generated dynamically by drawer.js -->
                    </div>
                </div>
                
                <!-- Right Side: Colors, Tools and Actions -->
                <div class="editor-tools-column">
                    <!-- Tool Selectors -->
                    <div class="editor-section">
                        <label class="section-label">Drawing Tool</label>
                        <div class="editor-tool-row">
                            <button type="button" id="editor-tool-pencil" class="editor-action-btn active" title="Pencil Tool">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="editor-btn-svg"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
                                <span>Pencil</span>
                            </button>
                            <button type="button" id="editor-tool-eraser" class="editor-action-btn" title="Eraser Tool">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="editor-btn-svg"><path d="M20 20H7L3 16l8-8 8 8-3 4M12 11l4 4"></path></svg>
                                <span>Eraser</span>
                            </button>
                            <button type="button" id="editor-tool-fill" class="editor-action-btn" title="Bucket Fill Tool">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="editor-btn-svg"><path d="M12 22a7 7 0 0 0 7-7c0-2.3-3.6-5.7-5.5-7.3-.8-.7-2.2-.7-3 0C8.6 9.3 5 12.7 5 15a7 7 0 0 0 7 7z"></path></svg>
                                <span>Fill All</span>
                            </button>
                        </div>
                    </div>
                    
                    <!-- Color Palette -->
                    <div class="editor-section">
                        <label class="section-label">Palette</label>
                        <div class="palette-grid" id="palette-grid">
                            <!-- Pre-defined color buttons -->
                            <button type="button" class="palette-color active" style="background-color: #f97316;" data-color="#f97316"></button>
                            <button type="button" class="palette-color" style="background-color: #3b82f6;" data-color="#3b82f6"></button>
                            <button type="button" class="palette-color" style="background-color: #10b981;" data-color="#10b981"></button>
                            <button type="button" class="palette-color" style="background-color: #475569;" data-color="#475569"></button>
                            <button type="button" class="palette-color" style="background-color: #d97706;" data-color="#d97706"></button>
                            <button type="button" class="palette-color" style="background-color: #78350f;" data-color="#78350f"></button>
                            <button type="button" class="palette-color" style="background-color: #0284c7;" data-color="#0284c7"></button>
                            <button type="button" class="palette-color" style="background-color: #ffffff;" data-color="#ffffff"></button>
                            <button type="button" class="palette-color" style="background-color: #000000;" data-color="#000000"></button>
                            <button type="button" class="palette-color" style="background-color: #ef4444;" data-color="#ef4444"></button>
                        </div>
                        <div class="custom-color-row">
                            <span>Custom Color:</span>
                            <input type="color" id="editor-color-picker" value="#f97316" title="Choose custom color">
                        </div>
                    </div>

                    <!-- Live Previews -->
                    <div class="editor-section">
                        <label class="section-label">Live Preview</label>
                        <div class="preview-row">
                            <div class="preview-box">
                                <div id="preview-large" class="preview-tile preview-lg"></div>
                                <span class="preview-desc">Large (48x48)</span>
                            </div>
                            <div class="preview-box">
                                <div id="preview-small" class="preview-tile preview-sm"></div>
                                <span class="preview-desc">Small (24x24)</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <footer class="modal-footer">
                <div class="left-actions">
                    <button type="button" id="editor-btn-restore" class="editor-sec-btn danger" title="Reset to original designer SVG">Restore Default</button>
                    <button type="button" id="editor-btn-clear" class="editor-sec-btn" title="Clear design to transparent">Clear Canvas</button>
                </div>
                <div class="right-actions">
                    <button type="button" id="editor-btn-cancel" class="editor-sec-btn" title="Discard changes and exit">Cancel</button>
                    <button type="button" id="editor-btn-save" class="editor-main-btn" title="Save custom graphic to map and close">Save Graphic</button>
                </div>
            </footer>
        </div>
    </div>

    <script src="drawer.js"></script>
</body>
</html>
